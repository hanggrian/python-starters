[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "library-extension"
version = "0.1"
license = { text = "Apache-2.0" }
description = "A very awesome library"
readme = "../README.md"
authors = [{ name = "John Doe", email = "johndoe@mail.com" }]
keywords = ["awesome library", "cool stuff"]
requires-python = ">=3.10.0"

[project.urls]
"Source Code" = "https://github.com/johndoe/library"
"Bug Tracker" = "https://github.com/johndoe/library/issues"

[tool.hatch.build.targets.wheel]
packages = ["library_extension"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
