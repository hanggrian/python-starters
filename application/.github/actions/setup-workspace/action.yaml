name: Setup Workspace
description: Checkout and install all dependencies

runs:
  using: composite
  steps:
    - uses: astral-sh/setup-uv@v7
      with:
        python-version: '3.14'

    - uses: actions/cache@v5
      with:
        path: .venv/
        key: uv-${{ hashFiles('uv.lock') }}

    - shell: bash
      run: pnpm i
